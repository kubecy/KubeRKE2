    user: "admin"
    password: "Harbor123@!"
    disable_default_registry_endpoint: true 
  k8s_user:                    ## 管理 K8S 集群专用用户                            
    group: kubeuser
    gid: 2456
    user: kubeuser
    uid: 2456
    password: kubeuser123@!
  token: "RtMjcuJSVrbVlTBwQwisumREZWtMgH6RiKOXSsMKwAJsvGRaxaMIPOE+U6GKySQj"
  software_dir: /app/rke2                           ## RKE2 二进制包目录
  rke2_worker_dir: /etc/rancher/rke2                ## RKE2工作目录 
