  profile: "cis"                                    ## 基准测试验证系统配置

## K8S MASTER
kube_control_plane_node:
  db:
    user: etcd
    uid: 2011
    group: etcd
    gid: 2011
    etcd_expose_metrics: true                       ## 暴露 etcd 指标
    etcd_disable_snapshots: false                   ## 禁用 etcd 自动快照
    etcd_snapshot_schedule_cron: "0 */8 * * *"      ## 快照间隔时间 
    etcd_snapshot_retention: 12                     ## 要保留的快照数量
    etcd_snapshot_compress: true                    ## 压缩 etcd 快照
  cni: "cilium"                           ## 部署的 CNI 插件, 可选值: none, calico, canal, cilium, multus 作为第一个值以启用 multus 元插件
  cluster_cidr: "10.244.0.0/16"           ## Pod IP 的 IPv4/IPv6 网络 CIDR
  service_cidr: "10.96.0.0/16"            ## 服务 IP 的 IPv4/IPv6 网络 CIDR 
  cluster_dns: "10.96.0.10"               ## CoreDNS 服务的 IPv4 集群 IP 地址, 在服务 CIDR 范围内
  service_node_port_range: "30000-65000"  ## NodePort 可见性的服务预留端口范围
  cluster_domain: "cluster.local"         ## Kubernetes 集群的 DNS 域后缀配置项
  tls_san:
    - 192.168.1.200  ## HA_VIP, 必须在第一行
    - 192.168.1.61   ## RKE2 SERVER1
    - 192.168.1.62   ## RKE2 SERVER2
    - 192.168.1.63   ## RKE2 SERVER3
  node_taint:        ## MASTER 注册带有污点 
    - "node-role.kubernetes.io/control-plane=true:NoSchedule"
  disable_cloud_controller: true  ## 禁用 rke2 默认云控制器管理器
  disable:                        ## 禁止部署已打包的组件, 有效项: rke2-coredns, rke2-ingress-nginx, rke2-metrics-server
    - rke2-ingress-nginx
  write_kubeconfig: /etc/rancher/rke2/rke2.yaml
  write_kubeconfig_mode: "0644"

  kube_apiserver_arg:
    - max-requests-inflight=600
    - event-ttl=12h
  etcd_arg:
    - auto-compaction-retention=8h
    - quota-backend-bytes=8589934592
    - heartbeat-interval=200
    
    

## K8S WORKER
kube_worker_node:
  kubelet_arg:
    - max-pods=150
    


  kube-proxy-arg:
